services:
  detector:
    build:
      context: ..
      dockerfile: docker/Dockerfile.detector
    container_name: nids-detector
    ports:
      - "8080:80"
    environment:
      - CSV_DIR=/app/data
    volumes:
      - ../data/raw:/app/data:ro,Z
      - ../data/processed:/app/data/processed:Z
      - ../src/detection/realtime_detector.py:/app/src/detection/realtime_detector.py:ro,Z
      - ../src/config.py:/app/src/config.py:ro,Z
    working_dir: /app
    command: python3 src/detection/realtime_detector.py
    networks:
      - nids-network
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.target
    container_name: target-server
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,Z
    networks:
      - nids-network
    restart: unless-stopped

  attacker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.attacker
    container_name: attacker-shell
    stdin_open: true
    tty: true
    networks:
      - nids-network
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW

networks:
  nids-network:
    driver: bridge
